name: Setup Firebase
description: Setup the firebase-tools CLI
author: Engineering 11
inputs:
  tools-version:
    description: Version of firebase-tools to install. Defaults to the latest release.
    required: false
  gcp_sa_key:
    description: Service account key (raw or base64-encoded JSON) used to authenticate firebase-tools.
    required: false
  project_id:
    description: >-
      Deprecated. Project to activate via `firebase use`. May be a project ID or
      a `.firebaserc` alias. Prefer passing `--project` to your firebase commands.
    required: false
  project_path:
    description: >-
      Deprecated. Path to the folder containing firebase.json / .firebaserc; used
      as the working directory when activating the project.
    required: false
branding:
  icon: activity
  color: gray-dark
runs:
  using: node24
  main: dist/action.js
  post: dist/cleanup.js
