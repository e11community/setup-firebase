version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-toolkit:
        patterns:
          - '@actions/*'
      dev-tooling:
        patterns:
          - esbuild
          - typescript
          - gts
          - prettier
          - '@types/*'
