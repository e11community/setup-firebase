name: Release

# When a release is published (e.g. tag v1.2.3), move the floating major tag
# (v1) to point at the released commit so consumers can pin to @v1.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  move-major-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move floating major tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag '$RELEASE_TAG' is not a vX.Y.Z semver tag; skipping."
            exit 1
          fi
          MAJOR="${RELEASE_TAG%%.*}"   # v1.2.3 -> v1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$RELEASE_TAG"
          git push -f origin "refs/tags/$MAJOR"
          echo "Moved $MAJOR -> $RELEASE_TAG"
